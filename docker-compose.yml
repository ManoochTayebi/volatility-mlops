services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/backend/data

  mlflow-ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: mlflow ui --host 0.0.0.0 --port 5001 --backend-store-uri /mlruns
    ports:
      - "5001:5001"
    volumes:
      - ./mlruns:/mlruns
