name: Azure Container App Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - devel-Azure

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'francecentral' }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      AZURE_CONTAINER_APP: ${{ vars.AZURE_CONTAINER_APP || 'volatility-mlops-app' }}
      AZURE_CONTAINER_APP_ENV: ${{ vars.AZURE_CONTAINER_APP_ENV || 'cae-volatility-mlops-dev' }}
      AZURE_MODEL_ARTIFACTS_CONTAINER: ${{ vars.AZURE_MODEL_ARTIFACTS_CONTAINER || 'volatility-model-artifacts' }}
      AZURE_MODEL_ARTIFACTS_PREFIX: ${{ vars.AZURE_MODEL_ARTIFACTS_PREFIX || 'latest' }}
      WINDOW_SIZE: ${{ vars.WINDOW_SIZE || '21' }}
      TRAIN_TEST_SPLIT: ${{ vars.TRAIN_TEST_SPLIT || '0.5' }}
      ROLLING_WINDOW: ${{ vars.ROLLING_WINDOW || '21' }}
      RNN_HIDDEN_SIZE: ${{ vars.RNN_HIDDEN_SIZE || '24' }}
      RNN_NUM_LAYERS: ${{ vars.RNN_NUM_LAYERS || '1' }}
      FC_HIDDEN_SIZE: ${{ vars.FC_HIDDEN_SIZE || '12' }}
      DROPOUT: ${{ vars.DROPOUT || '0.1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Build and push image to ACR
        run: |
          ACR_LOGIN_SERVER=$(az acr show \
            --name "$AZURE_ACR_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query loginServer \
            -o tsv)
          az acr login --name "$AZURE_ACR_NAME"
          docker build -t "$ACR_LOGIN_SERVER/volatility-mlops:${GITHUB_SHA}" .
          docker push "$ACR_LOGIN_SERVER/volatility-mlops:${GITHUB_SHA}"
          echo "IMAGE=$ACR_LOGIN_SERVER/volatility-mlops:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Ensure Container Apps environment exists
        run: |
          az containerapp env create \
            --name "$AZURE_CONTAINER_APP_ENV" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" || true

      - name: Deploy Container App
        run: |
          ACR_LOGIN_SERVER=$(az acr show \
            --name "$AZURE_ACR_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query loginServer \
            -o tsv)
          ACR_USERNAME=$(az acr credential show \
            --name "$AZURE_ACR_NAME" \
            --query username \
            -o tsv)
          ACR_PASSWORD=$(az acr credential show \
            --name "$AZURE_ACR_NAME" \
            --query passwords[0].value \
            -o tsv)
          az containerapp up \
            --name "$AZURE_CONTAINER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --environment "$AZURE_CONTAINER_APP_ENV" \
            --image "$IMAGE" \
            --target-port 8000 \
            --ingress external \
            --min-replicas 0 \
            --max-replicas 1 \
            --registry-server "$ACR_LOGIN_SERVER" \
            --registry-username "$ACR_USERNAME" \
            --registry-password "$ACR_PASSWORD" \
            --env-vars \
              AZURE_MODEL_ARTIFACTS_CONTAINER="$AZURE_MODEL_ARTIFACTS_CONTAINER" \
              AZURE_MODEL_ARTIFACTS_PREFIX="$AZURE_MODEL_ARTIFACTS_PREFIX" \
              WINDOW_SIZE="$WINDOW_SIZE" \
              TRAIN_TEST_SPLIT="$TRAIN_TEST_SPLIT" \
              ROLLING_WINDOW="$ROLLING_WINDOW" \
              RNN_HIDDEN_SIZE="$RNN_HIDDEN_SIZE" \
              RNN_NUM_LAYERS="$RNN_NUM_LAYERS" \
              FC_HIDDEN_SIZE="$FC_HIDDEN_SIZE" \
              DROPOUT="$DROPOUT"

      - name: Set Container App secrets
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          az containerapp secret set \
            --name "$AZURE_CONTAINER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --secrets azure-storage-connection-string="$AZURE_STORAGE_CONNECTION_STRING"

      - name: Attach storage secret to Container App
        run: |
          az containerapp update \
            --name "$AZURE_CONTAINER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --set-env-vars AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-connection-string

      - name: Print app URL
        run: |
          APP_FQDN=$(az containerapp show \
            --name "$AZURE_CONTAINER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          echo "UI/API: https://$APP_FQDN"
