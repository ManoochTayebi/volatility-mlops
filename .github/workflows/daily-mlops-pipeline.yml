name: Daily MLOps Pipeline

on:
  schedule:
    # Weekdays at 08:10 UTC
    - cron: '10 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONPATH: .
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SYMBOLS: ${{ vars.SYMBOLS || 'AAPL,GOOGL,MSFT' }}
      SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE || 'daily_stock_prices' }}
      MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI || 'file:./mlruns' }}
      MLFLOW_EXPERIMENT_NAME: ${{ vars.MLFLOW_EXPERIMENT_NAME || 'volatility-nn' }}
      MLFLOW_REGISTER_MODELS: ${{ vars.MLFLOW_REGISTER_MODELS || 'false' }}
      MLFLOW_MODEL_NAME_PREFIX: ${{ vars.MLFLOW_MODEL_NAME_PREFIX || 'volatility-nn' }}
      PUBLISH_DOCKER_IMAGE: ${{ vars.PUBLISH_DOCKER_IMAGE || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Report Supabase status before pipeline
        run: |
          python scripts/report_supabase_status.py --symbols "$SYMBOLS" --table "$SUPABASE_TABLE"

      - name: Run daily pipeline
        run: |
          python scripts/run_daily_pipeline.py --symbols "$SYMBOLS" --table "$SUPABASE_TABLE"

      - name: Report Supabase status after pipeline
        run: |
          python scripts/report_supabase_status.py --symbols "$SYMBOLS" --table "$SUPABASE_TABLE"

      - name: Upload trained artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models-and-runs
          path: |
            backend/data/nn_models/
            backend/data/saved_volatilities/
            mlruns/
          if-no-files-found: warn

      - name: Prepare image name
        if: env.PUBLISH_DOCKER_IMAGE == 'true'
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}-app" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        if: env.PUBLISH_DOCKER_IMAGE == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.PUBLISH_DOCKER_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        if: env.PUBLISH_DOCKER_IMAGE == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
