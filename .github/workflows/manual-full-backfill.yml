name: Manual Full Backfill

on:
  workflow_dispatch:

jobs:
  full-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONPATH: .
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SYMBOLS: ${{ vars.SYMBOLS || 'AAPL,GOOGL,MSFT' }}
      SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE || 'daily_stock_prices' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Report Supabase status before backfill
        run: |
          python scripts/report_supabase_status.py --symbols "$SYMBOLS" --table "$SUPABASE_TABLE"

      - name: Preflight checks
        run: |
          python scripts/preflight_check.py --symbols "$SYMBOLS" --table "$SUPABASE_TABLE"

      - name: Ingest full market history to Supabase
        run: |
          python scripts/ingest_market_data.py --mode full --symbols "$SYMBOLS" --table "$SUPABASE_TABLE"

      - name: Sync Supabase to local market CSVs
        run: |
          python scripts/sync_market_data_from_supabase.py --symbols "$SYMBOLS" --table "$SUPABASE_TABLE"

      - name: Report Supabase status after backfill
        run: |
          python scripts/report_supabase_status.py --symbols "$SYMBOLS" --table "$SUPABASE_TABLE"
