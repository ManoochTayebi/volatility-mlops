$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: volatility-daily-azure-mlops
experiment_name: volatility-mlops
description: Daily Azure SQL ingestion, retraining, MLflow tracking, and Azure Blob artifact upload.

code: ../..
command: >-
  python scripts/run_daily_pipeline.py
  --symbols ${{inputs.symbols}}
  --table ${{inputs.azure_sql_table}}

inputs:
  symbols: AAPL,GOOGL,MSFT
  azure_sql_table: dbo.daily_stock_prices

environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04
  conda_file: conda_env.yml

compute: azureml:volatility-cpu-lowcost

environment_variables:
  MARKET_DATA_SOURCE: azure_sql
  AZURE_UPLOAD_ARTIFACTS: "true"
  AZURE_MODEL_ARTIFACTS_CONTAINER: volatility-model-artifacts
  AZURE_MODEL_ARTIFACTS_PREFIX: latest
  MLFLOW_EXPERIMENT_NAME: volatility-mlops
  MLFLOW_REGISTER_MODELS: "false"
  WINDOW_SIZE: "21"
  TRAIN_TEST_SPLIT: "0.5"
  ROLLING_WINDOW: "21"
  RNN_HIDDEN_SIZE: "24"
  RNN_NUM_LAYERS: "1"
  FC_HIDDEN_SIZE: "12"
  DROPOUT: "0.1"
  BATCH_SIZE: "64"
  LEARNING_RATE: "0.001"
  EPOCHS: "20"
